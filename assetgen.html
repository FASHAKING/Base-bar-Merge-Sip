<!doctype html>
<html>
  <body>
    <canvas id="icon" width="1024" height="1024"></canvas>
    <canvas id="splash" width="200" height="200"></canvas>
    <canvas id="hero" width="1200" height="800"></canvas>
    <script type="module">
      import { drawDrink, DRINKS } from '/src/drinks.ts';

      function bg(ctx, w, h) {
        const g = ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, '#8fd8f0');
        g.addColorStop(0.45, '#bfeaf7');
        g.addColorStop(0.6, '#f7e2b0');
        g.addColorStop(1, '#efd193');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
        ctx.beginPath();
        ctx.arc(w * 0.82, h * 0.14, w * 0.1, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,240,170,0.9)';
        ctx.fill();
      }

      function title(ctx, x, y, size, text) {
        ctx.font = `bold ${size}px 'Trebuchet MS', sans-serif`;
        ctx.textAlign = 'center';
        ctx.lineWidth = size * 0.16;
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#7a4a21';
        ctx.strokeText(text, x, y);
        ctx.fillStyle = '#fff8ec';
        ctx.fillText(text, x, y);
      }

      // icon 1024 — one bold centered subject, no text, reads at 48px
      {
        const c = document.getElementById('icon');
        const ctx = c.getContext('2d');
        // tropical radial ground
        const g = ctx.createRadialGradient(512, 400, 80, 512, 512, 760);
        g.addColorStop(0, '#aee6f5');
        g.addColorStop(0.55, '#7ecbe8');
        g.addColorStop(1, '#4fa8d0');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 1024, 1024);
        // sun halo behind the mug
        const halo = ctx.createRadialGradient(512, 470, 100, 512, 470, 430);
        halo.addColorStop(0, 'rgba(255, 240, 170, 0.95)');
        halo.addColorStop(1, 'rgba(255, 240, 170, 0)');
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(512, 470, 430, 0, Math.PI * 2);
        ctx.fill();
        // sand arc at the bottom
        ctx.beginPath();
        ctx.ellipse(512, 1120, 720, 260, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#f3dfb2';
        ctx.fill();
        // sparkle stars
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        for (const [sx, sy, sr] of [[190, 200, 16], [840, 260, 12], [250, 640, 10], [830, 620, 14]]) {
          ctx.save();
          ctx.translate(sx, sy);
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            const rr = i % 2 === 0 ? sr : sr * 0.35;
            ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
        // the Legendary Tiki, large and fully in frame
        drawDrink(ctx, 9, 512, 520, 310);
      }

      // splash 200
      {
        const c = document.getElementById('splash');
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#7ecbe8';
        ctx.fillRect(0, 0, 200, 200);
        const halo = ctx.createRadialGradient(100, 95, 20, 100, 95, 95);
        halo.addColorStop(0, 'rgba(255, 240, 170, 0.9)');
        halo.addColorStop(1, 'rgba(255, 240, 170, 0)');
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, 200, 200);
        drawDrink(ctx, 9, 100, 100, 58);
      }

      // hero 1200x800
      {
        const c = document.getElementById('hero');
        const ctx = c.getContext('2d');
        bg(ctx, 1200, 800);
        title(ctx, 600, 200, 150, 'Merge Sip');
        ctx.font = 'bold 52px "Trebuchet MS", sans-serif';
        ctx.fillStyle = '#7a4a21';
        ctx.textAlign = 'center';
        ctx.fillText('Flick · Slide · Merge — chase the Legendary Tiki', 600, 290);
        const tiers = [1, 3, 4, 6, 8, 9];
        const xs = [140, 330, 520, 710, 900, 1080];
        for (let i = 0; i < tiers.length; i++) {
          drawDrink(ctx, tiers[i], xs[i], 560, 55 + i * 18);
          if (i < tiers.length - 1) {
            ctx.font = 'bold 70px sans-serif';
            ctx.fillStyle = '#7a4a21';
            ctx.fillText('›', (xs[i] + xs[i + 1]) / 2, 585);
          }
        }
      }
      window.__done = true;
    </script>
  </body>
</html>
