<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#7ecbe8" />
    <title>Merge Sip 🍹</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="description" content="Flick, slide and merge tropical drinks into the Legendary Tiki. A beach-bar shuffleboard merge game on Base." />
    <!-- Base Build domain-ownership verification -->
    <meta name="base:app_id" content="6a53d61ee3b311a8d678df8a" />

    <!-- Mini App embed metadata: makes links to the app render as a launchable card
         in Base App / Farcaster feeds. Replace https://mergesip.xyz with
         your deployed URL (see README). -->
    <meta
      name="fc:miniapp"
      content='{"version":"1","imageUrl":"https://mergesip.xyz/hero.png","button":{"title":"🍹 Play Merge Sip","action":{"type":"launch_miniapp","name":"Merge Sip","url":"https://mergesip.xyz","splashImageUrl":"https://mergesip.xyz/splash.png","splashBackgroundColor":"#7ecbe8"}}}'
    />
    <!-- Back-compat alias used by some clients -->
    <meta
      name="fc:frame"
      content='{"version":"1","imageUrl":"https://mergesip.xyz/hero.png","button":{"title":"🍹 Play Merge Sip","action":{"type":"launch_frame","name":"Merge Sip","url":"https://mergesip.xyz","splashImageUrl":"https://mergesip.xyz/splash.png","splashBackgroundColor":"#7ecbe8"}}}'
    />

    <!-- Display font (falls back to system fonts offline) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ink: #3f2711;
        --ink-soft: #8a6335;
        --cream: #fffaf0;
        --coral: #ed2228;
        --gold: #ffb31f;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #05a9ef;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        font-family: 'Fredoka', 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: linear-gradient(180deg, rgba(0, 164, 235, 0.28), rgba(170, 112, 32, 0.42));
        backdrop-filter: blur(8px) saturate(1.35);
        -webkit-backdrop-filter: blur(8px) saturate(1.35);
        z-index: 10;
      }
      .overlay[hidden] {
        display: none;
      }
      .card {
        position: relative;
        width: min(400px, 92vw);
        max-height: 88vh;
        overflow-y: auto;
        overflow-x: hidden;
        background:
          radial-gradient(140% 90% at 50% 0%, #fffdf6 0%, #fff6e4 55%, #fdeeD2 100%);
        border-radius: 26px;
        padding: 34px 24px 26px;
        box-shadow:
          0 34px 70px -14px rgba(60, 30, 5, 0.52),
          0 8px 20px rgba(60, 30, 5, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        display: flex;
        flex-direction: column;
        gap: 12px;
        text-align: center;
        animation: card-in 0.35s cubic-bezier(0.2, 1.2, 0.4, 1);
      }
      @keyframes card-in {
        from { transform: translateY(18px) scale(0.96); opacity: 0; }
        to { transform: none; opacity: 1; }
      }
      /* striped beach-bar awning across the top of the card */
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 14px;
        background: repeating-linear-gradient(
          90deg,
          #ff3f3f 0 26px,
          #fff8e8 26px 52px
        );
        border-radius: 26px 26px 0 0;
      }
      .card::after {
        content: '';
        position: absolute;
        top: 14px;
        left: 0;
        right: 0;
        height: 6px;
        background: linear-gradient(180deg, rgba(60, 30, 5, 0.18), transparent);
        pointer-events: none;
      }
      .card h1 {
        margin: 6px 0 0;
        font-size: 2.15rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: var(--coral);
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.8);
      }
      .card h2 {
        margin: 6px 0 0;
        font-size: 1.45rem;
        font-weight: 600;
        color: var(--coral);
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.8);
      }
      .tagline {
        margin: 0;
        color: #7d5a2e;
        font-weight: 400;
        line-height: 1.35;
      }
      .best-line {
        margin: 0;
        font-weight: 600;
        color: var(--ink-soft);
      }
      .btn {
        position: relative;
        border: none;
        border-radius: 999px;
        padding: 14px 18px;
        font: 600 1.05rem 'Fredoka', 'Trebuchet MS', sans-serif;
        letter-spacing: 0.02em;
        color: #fff;
        cursor: pointer;
        touch-action: manipulation;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        box-shadow:
          0 4px 10px rgba(60, 30, 5, 0.25),
          inset 0 1.5px 0 rgba(255, 255, 255, 0.45),
          inset 0 -3px 0 rgba(0, 0, 0, 0.16);
        transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
      }
      .btn:hover:not([disabled]) {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }
      .btn:active:not([disabled]) {
        transform: translateY(1px) scale(0.985);
        box-shadow:
          0 2px 5px rgba(60, 30, 5, 0.25),
          inset 0 1.5px 0 rgba(255, 255, 255, 0.35),
          inset 0 -1px 0 rgba(0, 0, 0, 0.12);
      }
      .btn.green { background: linear-gradient(180deg, #4ff09a, #08a84e); }
      .btn.blue { background: linear-gradient(180deg, #3d8cff, #1555ff); }
      .btn.orange { background: linear-gradient(180deg, #ffb12e, #ff7a00); }
      .btn.wood { background: linear-gradient(180deg, #c98a4a, #875118); }
      .btn[disabled] {
        opacity: 0.45;
        filter: saturate(0.4);
        cursor: default;
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.1);
      }
      #wallet-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-top: 2px dashed #ecd3a7;
        padding-top: 14px;
      }
      #wallet-section[hidden] { display: none; }
      #register-row {
        display: flex;
        gap: 8px;
      }
      #register-row[hidden] {
        display: none;
      }
      #connect-btn[hidden] {
        display: none;
      }
      #register-row input {
        flex: 1;
        min-width: 0;
        border: 2px solid #ecd3a7;
        border-radius: 999px;
        padding: 12px 18px;
        font: 500 1rem 'Fredoka', 'Trebuchet MS', sans-serif;
        color: var(--ink);
        background: #fffdf9;
        box-shadow: inset 0 2px 4px rgba(60, 30, 5, 0.07);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      #register-row input::placeholder {
        color: #c8ab7e;
      }
      #register-row input:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow:
          inset 0 2px 4px rgba(60, 30, 5, 0.07),
          0 0 0 4px rgba(244, 177, 62, 0.25);
      }
      #username-line {
        margin: 0;
        font-weight: 600;
        color: #1fa25c;
        cursor: pointer;
      }
      #challenge-line {
        color: #e8801a;
      }
      #challenge-line[hidden] {
        display: none;
      }
      #username-line[hidden] {
        display: none;
      }
      .status {
        margin: 0;
        min-height: 1.1em;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--ink-soft);
      }
      .status.error { color: var(--coral); }
      #badge-row[hidden] { display: none; }
      .badge-title {
        margin: 0 0 4px;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }
      #badge-icons {
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      #badge-icons canvas {
        width: 44px;
        height: 44px;
        filter: drop-shadow(0 2px 3px rgba(60, 30, 5, 0.25));
      }
      #badge-icons canvas.locked {
        opacity: 0.22;
        filter: grayscale(1);
      }
      #board-tabs {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .tab {
        border: 2px solid #ecd3a7;
        border-radius: 999px;
        padding: 8px 18px;
        font: 600 0.9rem 'Fredoka', 'Trebuchet MS', sans-serif;
        color: var(--ink-soft);
        background: #fffdf9;
        cursor: pointer;
        touch-action: manipulation;
        transition: all 0.15s ease;
      }
      .tab.active {
        background: linear-gradient(180deg, #ffb12e, #ff7a00);
        border-color: transparent;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        box-shadow: 0 3px 8px rgba(239, 122, 16, 0.35);
      }
      #board-list {
        margin: 0;
        padding: 0;
        list-style: none;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #board-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        background: linear-gradient(180deg, #fffefa, #fff2d5);
        border: 1px solid rgba(236, 211, 167, 0.8);
        border-radius: 14px;
        padding: 9px 14px;
        color: var(--ink);
        box-shadow: 0 1px 3px rgba(60, 30, 5, 0.08);
      }
      #board-list li:first-child {
        background: linear-gradient(180deg, #fff8c7, #ffe582);
        border-color: #f2cd7c;
        box-shadow: 0 2px 8px rgba(244, 177, 62, 0.3);
      }
      #board-list .rank {
        font-weight: 700;
        width: 1.7em;
        color: var(--coral);
      }
      #board-list .who {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 600;
      }
      #board-list .pts {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: #7d5a2e;
      }
      #board-list .empty {
        justify-content: center;
        color: var(--ink-soft);
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="intro" class="overlay">
      <div class="card">
        <h1>🍹 Merge Sip</h1>
        <p class="tagline">Slide matching drinks together and mix your way up to the Legendary Tiki!</p>
        <p id="intro-best" class="best-line"></p>
        <p id="challenge-line" class="best-line" hidden></p>
        <button id="connect-btn" class="btn blue" hidden>Connect Wallet</button>
        <div id="register-row" hidden>
          <input id="username-input" maxlength="16" placeholder="pick_a_username" autocomplete="off" spellcheck="false" />
          <button id="register-btn" class="btn orange">Register</button>
        </div>
        <p id="username-line" hidden></p>
        <p id="register-status" class="status"></p>
        <button id="play-btn" class="btn green" disabled>▶ &nbsp;Start Mixing</button>
        <button id="daily-btn" class="btn orange" disabled>🌞 &nbsp;Daily Mix</button>
        <p id="daily-status" class="status"></p>
        <div id="wallet-section" hidden>
          <div id="badge-row" hidden>
            <p class="badge-title">Milestone badges</p>
            <div id="badge-icons"></div>
          </div>
          <button id="board-btn" class="btn wood">🏆 &nbsp;Leaderboard</button>
        </div>
      </div>
    </div>

    <div id="board" class="overlay" hidden>
      <div class="card">
        <h2>🏆 Top Mixologists</h2>
        <div id="board-tabs">
          <button id="tab-all" class="tab active">All-time</button>
          <button id="tab-week" class="tab">This Week</button>
        </div>
        <ol id="board-list"></ol>
        <button id="board-close" class="btn green">Back</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
