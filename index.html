<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#7ecbe8" />
    <title>Merge Sip 🍹</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="description" content="Flick, slide and merge tropical drinks into the Legendary Tiki. A beach-bar shuffleboard merge game on Base." />

    <!-- Mini App embed metadata: makes links to the app render as a launchable card
         in Base App / Farcaster feeds. Replace https://merge-sip.example.com with
         your deployed URL (see README). -->
    <meta
      name="fc:miniapp"
      content='{"version":"1","imageUrl":"https://merge-sip.example.com/hero.png","button":{"title":"🍹 Play Merge Sip","action":{"type":"launch_miniapp","name":"Merge Sip","url":"https://merge-sip.example.com","splashImageUrl":"https://merge-sip.example.com/splash.png","splashBackgroundColor":"#7ecbe8"}}}'
    />
    <!-- Back-compat alias used by some clients -->
    <meta
      name="fc:frame"
      content='{"version":"1","imageUrl":"https://merge-sip.example.com/hero.png","button":{"title":"🍹 Play Merge Sip","action":{"type":"launch_frame","name":"Merge Sip","url":"https://merge-sip.example.com","splashImageUrl":"https://merge-sip.example.com/splash.png","splashBackgroundColor":"#7ecbe8"}}}'
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #7ecbe8;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: linear-gradient(180deg, rgba(126, 203, 232, 0.92), rgba(247, 226, 176, 0.94));
        z-index: 10;
      }
      .overlay[hidden] {
        display: none;
      }
      .card {
        width: min(400px, 92vw);
        max-height: 88vh;
        overflow-y: auto;
        background: #fff8ec;
        border: 5px solid #c07d3e;
        border-radius: 24px;
        padding: 24px 22px;
        box-shadow: 0 12px 40px rgba(90, 52, 16, 0.35);
        display: flex;
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
      .card h1 {
        margin: 0;
        font-size: 2rem;
        color: #c0392b;
      }
      .card h2 {
        margin: 0;
        font-size: 1.4rem;
        color: #c0392b;
      }
      .tagline {
        margin: 0;
        color: #6b4a22;
      }
      .best-line {
        margin: 0;
        font-weight: bold;
        color: #8a6a3a;
      }
      .btn {
        border: none;
        border-radius: 999px;
        padding: 13px 18px;
        font: bold 1.05rem 'Trebuchet MS', sans-serif;
        color: #fff;
        cursor: pointer;
        touch-action: manipulation;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn.green { background: #2eb872; }
      .btn.blue { background: #4f6df5; }
      .btn.orange { background: #f2811d; }
      .btn.wood { background: #a8672f; }
      .btn[disabled] {
        opacity: 0.6;
        cursor: default;
      }
      #wallet-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-top: 2px dashed #e2c9a0;
        padding-top: 14px;
      }
      #wallet-section[hidden] { display: none; }
      #register-row {
        display: flex;
        gap: 8px;
      }
      #register-row[hidden] {
        display: none;
      }
      #connect-btn[hidden] {
        display: none;
      }
      #register-row input {
        flex: 1;
        min-width: 0;
        border: 2px solid #c07d3e;
        border-radius: 12px;
        padding: 10px 12px;
        font: 1rem 'Trebuchet MS', sans-serif;
        color: #5a3410;
        background: #fffdf8;
      }
      #register-row input:focus {
        outline: 3px solid rgba(242, 129, 29, 0.4);
      }
      #username-line {
        margin: 0;
        font-weight: bold;
        color: #2eb872;
        cursor: pointer;
      }
      #challenge-line {
        color: #e8801a;
      }
      #challenge-line[hidden] {
        display: none;
      }
      #username-line[hidden] {
        display: none;
      }
      .status {
        margin: 0;
        min-height: 1.1em;
        font-size: 0.85rem;
        color: #8a6a3a;
      }
      .status.error { color: #c0392b; }
      #badge-row[hidden] { display: none; }
      .badge-title {
        margin: 0 0 4px;
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #8a6a3a;
      }
      #badge-icons {
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      #badge-icons canvas {
        width: 44px;
        height: 44px;
      }
      #badge-icons canvas.locked {
        opacity: 0.25;
        filter: grayscale(1);
      }
      #board-tabs {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .tab {
        border: 2px solid #c07d3e;
        border-radius: 999px;
        padding: 7px 16px;
        font: bold 0.9rem 'Trebuchet MS', sans-serif;
        color: #8a6a3a;
        background: #fffdf8;
        cursor: pointer;
        touch-action: manipulation;
      }
      .tab.active {
        background: #f2811d;
        border-color: #f2811d;
        color: #fff;
      }
      #board-list {
        margin: 0;
        padding: 0;
        list-style: none;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #board-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fff2dc;
        border-radius: 12px;
        padding: 8px 12px;
        color: #5a3410;
      }
      #board-list .rank {
        font-weight: bold;
        width: 1.6em;
        color: #c0392b;
      }
      #board-list .who {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: bold;
      }
      #board-list .pts {
        font-variant-numeric: tabular-nums;
        font-weight: bold;
      }
      #board-list .empty {
        justify-content: center;
        color: #8a6a3a;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="intro" class="overlay">
      <div class="card">
        <h1>🍹 Merge Sip</h1>
        <p class="tagline">Slide matching drinks together and mix your way up to the Legendary Tiki!</p>
        <p id="intro-best" class="best-line"></p>
        <p id="challenge-line" class="best-line" hidden></p>
        <button id="connect-btn" class="btn blue" hidden>Connect Wallet</button>
        <div id="register-row" hidden>
          <input id="username-input" maxlength="16" placeholder="pick_a_username" autocomplete="off" spellcheck="false" />
          <button id="register-btn" class="btn orange">Register</button>
        </div>
        <p id="username-line" hidden></p>
        <p id="register-status" class="status"></p>
        <button id="play-btn" class="btn green" disabled>▶ &nbsp;Start Mixing</button>
        <button id="daily-btn" class="btn orange" disabled>🌞 &nbsp;Daily Mix</button>
        <p id="daily-status" class="status"></p>
        <div id="wallet-section" hidden>
          <div id="badge-row" hidden>
            <p class="badge-title">Milestone badges</p>
            <div id="badge-icons"></div>
          </div>
          <button id="board-btn" class="btn wood">🏆 &nbsp;Leaderboard</button>
        </div>
      </div>
    </div>

    <div id="board" class="overlay" hidden>
      <div class="card">
        <h2>🏆 Top Mixologists</h2>
        <div id="board-tabs">
          <button id="tab-all" class="tab active">All-time</button>
          <button id="tab-week" class="tab">This Week</button>
        </div>
        <ol id="board-list"></ol>
        <button id="board-close" class="btn green">Back</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
