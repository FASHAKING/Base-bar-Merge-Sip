<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#7ecbe8" />
    <title>Merge Sip 🍹</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="description" content="Flick, slide and merge tropical drinks into the Legendary Tiki. A beach-bar shuffleboard merge game on Base." />

    <!-- Mini App embed metadata: makes links to the app render as a launchable card
         in Base App / Farcaster feeds. Replace https://merge-sip.example.com with
         your deployed URL (see README). -->
    <meta
      name="fc:miniapp"
      content='{"version":"1","imageUrl":"https://merge-sip.example.com/hero.png","button":{"title":"🍹 Play Merge Sip","action":{"type":"launch_miniapp","name":"Merge Sip","url":"https://merge-sip.example.com","splashImageUrl":"https://merge-sip.example.com/splash.png","splashBackgroundColor":"#7ecbe8"}}}'
    />
    <!-- Back-compat alias used by some clients -->
    <meta
      name="fc:frame"
      content='{"version":"1","imageUrl":"https://merge-sip.example.com/hero.png","button":{"title":"🍹 Play Merge Sip","action":{"type":"launch_frame","name":"Merge Sip","url":"https://merge-sip.example.com","splashImageUrl":"https://merge-sip.example.com/splash.png","splashBackgroundColor":"#7ecbe8"}}}'
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #7ecbe8;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
